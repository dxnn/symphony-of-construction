<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Symphony of Construction</title>
  <style>

    @font-face {
      font-family: "ComicMono";
      src: local("Comic Mono"), local("ComicMono"), url("ComicMono.ttf");
    }

    @font-face {
      font-family: "ComicMono";
      src: 
        local("Comic Mono Bold"),
        local("ComicMono-Bold"),
        url("ComicMono-Bold.ttf");
      font-weight: bold;
    }

    html, body, pre, button, input {
      font-family: "ComicMono", monospace;
    }

    pre {
      width: 100vw;
      font-size: clamp(12px, 2.2vw, 40px);
      overflow: hidden;
    }
   
    #container {
      position: relative;
    } 

    #container pre {
      margin: 0px;
    }

    #subfield {
      z-index: -10;
    }
 
    #field {
      position:absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    #selectfield {
      position:absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
    }

    #selectfield::selection {
      background: transparent;
      color: inherit;
    }

    button, input {
      border: none;
      background-color: transparent;
    }

    .selection {
      background-color: rgb(0, 255, 102);
    }

    .link {
      cursor: pointer;
      display: inline;
    }
      
  </style>
</head>

<body>
  <!--
    Talk about:
    - 260 osc/gain combos (50% cpu w/ all gains 0) vs 26
    - cell autom style processing w/ immutable boards -> memleak (-> GC, segmented generations), so flip-flop
    - cellauto -> no cheating, (so any copy runs) but makes pathfinding more expensive and limits customization
    - setTimeout vs context.currentTime
    - Z is noise / hihat
    - later, allow control over individual sounds / effects

  <pre id="header">
<strong>Symphony of Construction</strong>
<em>A browser-based zero-player roguelike cellular automata modular synthesizer</em>
  </pre>

  <div id="container">
    <pre id="subfield"></pre>
    <pre id="field"></pre>
    <pre id="selectfield"></pre>
  </div>

  <p></p>

  <pre id="plause" class="link"> <span style="color: orange">play</span> </pre>
  <pre style="display: inline">BPM</pre>
  <pre id="tempo" contenteditable="true" style="display:inline; width:3em">125</pre>
  <pre style="display: inline">Volume</pre>
  <pre id="volume" contenteditable="true" style="display:inline; width:3em">5</pre>

  <pre id="freqq"></pre>

  <pre id="clear-button"   class="link">Clear</pre>
  <pre id="preset1-button" class="link">HazyL</pre>
  <pre id="preset2-button" class="link">Predawn</pre>
  <pre id="preset3-button" class="link">Firescape</pre>

  <script>
    let el = document.getElementById.bind(document)
    let field_el = el('field')
    let subfield_el = el('subfield')
    let selectfield_el = el('selectfield')

    let tempo = 125
    let modmax = 32
    let generators = []
    let field_length = 80
    let field_rows = 24
    let time = 0
    let context, analyser, maingain
    let g_pause = true
    let presets = []
    let sell_ect = {}
    let field = make_field()
    let copy = make_field()
    let setup_done = false


    // set up the audio nodes
    function audio_setup() {
      if(context && context.state === 'suspended') 
          context.resume()
      
      if(setup_done) return

      context = new window.AudioContext()
      analyser = context.createAnalyser()
      maingain = context.createGain()

      maingain.connect(analyser)
      set_volume()

      analyser.smoothingTimeConstant = 0.1
      analyser.fftSize = 256

      javascriptNode = context.createScriptProcessor(2048, 1, 1)
      javascriptNode.connect(context.destination)  // why doesn't this play the sound?

      analyser.connect(javascriptNode)
      analyser.connect(context.destination)


      // build our symphony of destruction
      oscs = []
      gains = []
      filters = {}
      freqs = [60, 67.5, 75, 80, 90, 100, 112.5  // A-G
             , 240,  270,  300,  320,  360,  400,  450   // H-N
             , 960,  1080, 1200, 1280, 1440, 1600, 1800  // O-U
            //  , 1920, 2160, 2400, 2560, 2880, 3200, 3600  // V-Y
             , 3840, 4320, 4800, 5120, 5760, 6400, 7200] // ???

      for(var i = 0; i < 25; i++) {
        var gain = context.createGain()
        gain.connect(maingain)
        gain.gain.value = 0

        var osc = context.createOscillator()
        osc.frequency.value = freqs[i]
        osc.start(0)
        osc.connect(gain)

        // filters[j].notes.push(gain)
        gains.push(gain)
        oscs.push(osc)
      }

      // Z is special
      var gain = context.createGain()
        , noise = context.createScriptProcessor(4096, 1, 1)

      gain.gain.value = 0
      gain.connect(maingain)
      noise.connect(gain)
      gains.push(gain)
      oscs.push(noise)

      noise.onaudioprocess = function (e) {
        var output = e.outputBuffer.getChannelData(0)
        for(var i = 0; i < 4096; i++) {
          output[i] = Math.random() * 2 - 1
        }
      }

      javascriptNode.onaudioprocess = function () {
        var array = new Uint8Array(analyser.frequencyBinCount)
        analyser.getByteFrequencyData(array)
        drawSpectrum(array)
      }

      setup_done = true
    }

    function drawSpectrum(fs) {
      let rows = 8, cols = 64, letem = 25 / cols
      let xs = Array(rows * cols).fill(' ')

      for(let x = 0; x < cols; x++) {
        let v = Math.ceil(fs[x] / 255 * rows)
        for(let y = 0; y < v; y++) {
          let i = ((rows - 1 - y) * cols) + x
          xs[i] = String.fromCharCode(65 + Math.floor(letem * x))
        }
      }

      let lines = xs.join('').match(/.{1,64}/g)
      let colours = ['pink', 'red', 'orange', 'gold', 'green', 'blue', 'purple', 'violet']
      lines = lines.map((str, i) => `<span style="color:${colours[i]}">` + str + '</span>')
      el('freqq').innerHTML = lines.join("\n")
    }


    // read playfield
    function import_field(field_string) {
      field = make_field(
        field_string
          .replace(/[a-z&'()*+,\-.\/]/g, ' ')
          .replace(/[^ A-Z0-9\n]/g, '')
          .split("\n")
          .map(function (line) {
            line = line.slice(0, field_length)
            line = line + Array(field_length - line.length + 1).join(' ')
            return line.split('')
          }))

      get_new_gens()
    }

    function get_new_gens() {
      generators = [] // global
      let copy = JSON.parse(JSON.stringify(field)) // local

      for(let y = 0; y < field_rows; y++) {
        for(let x = 0; x < field_length; x++) {

          if(!/[A-Z0-9]/.test(copy[y][x])) continue

          let char = copy[y][x]
          let pairs = flood_fill(copy, y, x)
          let rx = pairs.reduce((acc, [py, px]) => py === y && px > acc ? px : acc, 0)

          pairs.forEach(([py, px]) => copy[py][px] = ' ')
          generators.push({count: pairs.length, note: char, row: y, coll: x, colr: rx})
        }
      }
    }

    function flood_fill(xs, y, x) {
      let pairs = []
      let seen = {}
      let todo = [[y, x]]
      let char = xs[y][x]
      while(todo.length) {
        let [py, px] = todo.pop()
        if(xs[py]?.[px] !== char) continue
        if(seen[py+'-'+px]) continue
        seen[py+'-'+px] = true
        pairs.push([py, px])
        todo.push([py+1, px])
        todo.push([py-1, px])
        todo.push([py, px+1])
        todo.push([py, px-1])
      }
      return pairs
    }


    // manipulate playfield
    function step_field (field, generators) {
      for(var y = 0, l = field.length; y < l; y++) { // ugh yuck yuck
        for(var x = 0, k = field[y].length; x < k; x++) {
          copy[y][x] = field[y][x]
          // copy[y][x] = ' '
        }
      }

      // move things
      for(var y = 0, l = field.length; y < l; y++) {
        for(var x = 0, k = field[y].length; x < k; x++) {
          var old_c = field[y][x]

          // copy[y][x] = ' '

          if(/[A-Z0-9]/.test(old_c)) {
            copy[y][x] = old_c
            continue
          }

          if(!/[a-z&'()*+,\-.\/]/.test(old_c))
            continue

          var is_alpha = /[a-z]/.test(old_c)
            , other = !is_alpha ? /[a-z]/ : /[&'()*+,\-.\/]/
            , done = false

          // anything immediate?
          close_encounters:
          for(var ydel = -1; ydel <= 1; ydel++) {
            for(var xdel = -1; xdel <= 1; xdel++) {
              if(y + ydel != bound(y + ydel, field.length) || x + xdel != bound(x + xdel, field[y].length))
                continue

              var new_c = field[y + ydel][x + xdel]

              if(other.test(new_c)) {
                done = true
                if(is_alpha) // stand still
                  break close_encounters

                collide(old_c, new_c) // or chomp everything around you
                copy[y][x] = ' '
                copy[y + ydel][x + xdel] = ' '
              }
            }
          }

          if(done)
            continue

          // look around you
          var distance = 1
          do_movement:
          while(distance++ < 15) {
            var row_min = Math.max(y - distance, 0)
              , row_max = Math.min(y + distance, field.length - 1)
              , col_min = Math.max(x - distance, 0)
              , col_max = Math.min(x + distance, field[y].length - 1)

            for(var i = col_min; i <= col_max; i++) { // top
              if(other.test(field[row_min][i]))
                if(trytrymove(y, x, row_min - y, i - x))
                  break do_movement
            }

            for(var i = row_min; i <= row_max; i++) { // sides
              if(other.test(field[i][col_min])) {
                if(trytrymove(y, x, i - y, col_min - x))
                  break do_movement
              }
              if(other.test(field[i][col_max])) {
                if(trytrymove(y, x, i - y, col_max - x))
                  break do_movement
              }
            }

            for(var i = col_min; i <= col_max; i++) { // bottom
              if(other.test(field[row_max][i])) {
                if(trytrymove(y, x, row_max - y, i - x))
                  break do_movement
              }
            }
          }

          // where do i want to go?
          // TODO: A* algo goes here

          // var new_y = bound(Math.round(y-1+(Math.random()*2)), field.length)
          //   , new_x = bound(Math.round(x-1+(Math.random()*2)), field[y].length)

          // var new_y = y
          //   , new_x = is_alpha
          //             ? bound(x+1, field[y].length)
          //             : bound(x-1, field[y].length)
          //   , new_c = field[new_y][new_x]
          //
          // // collision?
          // if(collide(time, old_c, new_c)) {
          //   copy[y][x] = ' '
          //   copy[new_y][new_x] = ' '
          // }
          // // can i move there?
          // else if(new_c == ' ') {
          //   copy[y][x] = ' '
          //   copy[new_y][new_x] = old_c
          // }

        }
      }

      // spawn things
      for(var i = 0, l = generators.length; i < l; i++) {
        var gen = generators[i]
          , is_alpha = /[A-Z]/.test(gen.note)
          , spawn_row = gen.row // bound(is_alpha ? gen.row - 1 : gen.row, field_rows)
          , spawn_col = bound(is_alpha ? gen.colr + 1 : gen.coll - 1, field_length)
          , modulo = 1 + modmax - Math.min(gen.count, modmax)

        if(!(time % modulo)) {
          // copy[gen.row - 1 < 0 ? copy.length-1 : gen.row - 1][gen.col] = // TODO: look before we smash

          var old_c = copy[spawn_row][spawn_col]
            , new_note = gen.note.charCodeAt(0) > 57
                       ? gen.note.toLowerCase()
                       : String.fromCharCode(gen.note.charCodeAt(0) - 10)

          if(old_c != ' ') { // look before we smash
            if(collide(old_c, new_note)) {
              copy[spawn_row][spawn_col] = ' '
            }
          } else {
            copy[spawn_row][spawn_col] = new_note
          }

        }
      }

      return copy
    }

    function trytrymove (y, x, ydel, xdel) {
      var yoffset = Math.abs(ydel) >= Math.abs(xdel) ? ydel / Math.abs(ydel) : 0
        , xoffset = Math.abs(xdel) > Math.abs(ydel) ? xdel / Math.abs(xdel) : 0

      // can i move there?
      if(trymove(y, x, yoffset, xoffset))
        return true

      // or here?
      if(trymove(y, x, yoffset ? yoffset : yoffset - 1, xoffset ? xoffset : xoffset - 1))
        return true

      // or over there?
      if(trymove(y, x, yoffset ? yoffset : yoffset + 1, xoffset ? xoffset : xoffset + 1))
        return true
    }

    function trymove (y, x, yoffset, xoffset) {
      let new_y = Math.max(y + yoffset, 0)
        , new_x = Math.max(x + xoffset, 0)

      if(!field[new_y]?.[new_x]) return

      if(field[new_y][new_x] == ' ' && copy[new_y][new_x] == ' ') {
        copy[y][x] = ' '
        copy[new_y][new_x] = field[y][x]
        return true
      }
      else if(copy[new_y][new_x] != ' ') {
        // console.log('collision!', copy[y][x], field[y][x], copy[new_y][new_x], field[new_y][new_x])
      }
      else {
        // console.log('wat', copy[y][x], field[y][x], copy[new_y][new_x], field[new_y][new_x])
      }
    }

    //    var is_other = function(x, y, other) {
    //      var other = is_alpha ?
    //                  /[&'()*+,\-.\/]/ :
    //                  /[a-z]/
    //
    //      if(other.test(field[y][x])) {
    //        return true
    //        if(is_alpha) { // do nothing
    //        } else {
    //
    //        }
    //      }
    //      if(collide(time, old_c, new_c)) {
    //        copy[y][x] = ' '
    //        copy[new_y][new_x] = ' '
    //      }
    //      // can i move there?
    //      else if(new_c == ' ') {
    //        copy[y][x] = ' '
    //        copy[new_y][new_x] = old_c
    //      }
    //
    //    }


    function collide (old_c, new_c) {
      if((/[a-z]/.test(old_c) && /[&'()*+,\-.\/]/.test(new_c))
        || (/[a-z]/.test(new_c) && /[&'()*+,\-.\/]/.test(old_c))) {
        // console.log('Oh! ' + copy[y][x] + ' ran smack into ' + copy[new_y][new_x] + '!! Ouch!')
        // field[y][x] = ' ' // yuck
        // field[new_y][new_x] = ' ' // yuck

        var num = Math.min(old_c.charCodeAt(0), new_c.charCodeAt(0)) - 37
          , alpha = Math.max(old_c.charCodeAt(0), new_c.charCodeAt(0)) - 97

        activate(num, alpha)

        return true
      }
    }

    function bound (num, limit) {
      if(num < 0)
        return limit - 1
      if(num >= limit)
        return 0
      return num
    }


    function activate (num, alpha) {
      var gain = gains[alpha]
        , duration = Math.pow(2, num + 2) / 1000

      var now = context.currentTime
      gain.gain.cancelScheduledValues(now)
      gain.gain.setValueAtTime(0, now)
      gain.gain.linearRampToValueAtTime(1, now + duration / 2)
      gain.gain.linearRampToValueAtTime(0, now + duration)
    }

    function run () {
      if(!g_pause)
        run_once()
      timeout = setTimeout(run, 60 * 1000 / tempo / 4) // 4 quarters
    }

    function run_once () {
      time++
      step_field(field, generators)
      var temp = field
      field = copy
      copy = temp
      draw_field(field)
    }


    //// field management

    function fieldstr_to_url_string(fieldstr) {
      let lines = fieldstr.split("\n")

      lines = lines.map(line => {
        line = line.replace(/[^A-Z0-9]/g, ' ')                 // only keep generators
        line = line.slice(0, field_length)                     // truncate
        if(line.length < field_length)                         // pad
          line = line + Array(field_length - line.length).fill(" ").join('')
        return line
      })

      let str = lines.join('').replace(/ /g, '_')              // spaces aren't uriable
      str = str.replace(/_(_+)_/g,                             // compress long spaces
            function (match, inner) {return '-' + (inner.length + 2) + '-'})

      return str
    }

    function url_string_to_field(url_string) {
      return 0,
        url_string
          .replace(/-(\d+)-/g,                                 // decompress spaces
            function (match, inner) {return Array(+inner).fill('_').join('')})
          .replace(/_/g, ' ')
          .replace(RegExp('.{' + field_length + '}', 'g'), "$&\n")
    }

    function get_uri_params() {
      return 0,
        window.location.search
          .substring(1)
          .split('&')
          .reduce(function (acc, item) {
            return item ? add_value.apply(null, item.split('=').concat([acc])) : acc
          }, {})
    }

    function add_value(key, value, acc) {
      acc[key] = value
      return acc
    }


    function set_url() {
      let url_string = fieldstr_to_url_string(field_to_str(field))
      let state = {tempo, url_string}
      history.pushState(state, '', '?tempo=' + tempo + '&field=' + url_string)
    }

    function set_field(url_string) {
      let fieldstr = url_string_to_field(url_string)
      stop()
      // set_url(url_string, tempo)
      draw_field(fieldstr)
      import_field(fieldstr)
      // run()
    }

    function draw_field(field) {
      field_el.textContent = typeof field == 'string'
        ? field
        : field_to_str(field)
    }


    function clamp(min, n, max) {
      return min > n ? min 
           : n > max ? max
                     : n
    }

    function set_tempo(value) {
      tempo = clamp(10, +value, 1000) || 125 // BPM
    }

    function set_volume(value) {
      maingain.gain.value = (clamp(0, +value, 100) || 5) / 100
    }

    function plause() {
      g_pause = !g_pause
      el('plause').innerHTML = g_pause ? ' <span style="color: orange">play</span> ' : ' <span style="color: green">pause</span>'
    }

    function setup_presets() {
      presets[0] = 'A-18-9-140-CCCCC-19-33333-51-CCCCC-19-33333-131-EEEEE-20-4444-136-WW-78-WW-78-WW-78-WW-41-MM-8-4-26-WW-41-OO-6-7-28-WW-41-QQ-7-5-27-WW-233-ZZZZ-12-1111-60-ZZZZ-12-1111-24-DD-6-2-27-ZZZZ-12-1111-24-DD-6-22-26-ZZZZ-12-1111-60-ZZZ-13-111-61-'
      presets[1] = 'AAAAAAA-11-33333333-54-CCCCCCC-19-33333333-46-EEEEEEE-27-33333333-678-KKKKKKKK-24-11111111-40-KKKKKKKK-24-11111111-40-KKKKKKKK-24-11111111-200-'
      presets[2] = '-6-Q-29-9-57-S-20-2-127-5-26-TT-51-5-22-4-56-3-13-XX-64-3-8-8-239-2-93-GG-6-9-79-9-45-AA-14-MM-4-7-11-9-45-AA-32-9-5-11-78-11-38-'
      
      el('clear-button').onclick = function (e) { set_field(" ") }
      el('preset1-button').onclick = function (e) { set_field(presets[0]) }
      el('preset2-button').onclick = function (e) { set_field(presets[1]) }
      el('preset3-button').onclick = function (e) { set_field(presets[2]) }
    }

    function init() {
      spaceel(subfield_el)
      spaceel(selectfield_el)
      setup_presets()
      let params = get_uri_params()
      set_tempo(params.tempo || tempo)
      set_field(params.field || presets[0])
      run()
      drawSpectrum(Array(64).fill(0))
    }

    // DOM bindings
    document.addEventListener('DOMContentLoaded', function () {
      el('plause').onclick = function (e) {plause()}
      el('tempo').oninput = function (e) {set_tempo(e.target.textContent)}
      el('volume').oninput = function (e) {set_volume(e.target.textContent)}

      document.body.addEventListener('click', function () { // Audio context needs to be resumed after user interaction
        audio_setup()
      }, {once: true})

      document.addEventListener('keyup', e => {
        audio_setup()
        if(e.key === 'Enter') {
          plause()
          return
        }
        if(!sell_ect.start) return
        let key = e.key.toUpperCase() 
        if(!/[0-9A-Z ]/.test(key)) return
        add_block(key, sell_ect)
        draw_field(field)
        clear_select()
      }) 

      document.addEventListener('click', e => { 
        if(!selectfield_el.contains(e.target)) 
          clear_select()
      })

      init()
    })


    // ???

    function make_field(box=[]) {
      let sb = spacebox()
      box.forEach((line, y) => {
        line.forEach((char, x) => y < field_rows && x < field_length ? sb[y][x] = char : 0)
      })
      return sb
    }

    function clear_select() {
      spaceel(subfield_el)
      sell_ect = {}
    }

    function add_block(char, {start, end}) {
      for(let y=start.row; y<=end.row; y++)
        for(let x=start.col; x<end.col; x++)
          field[y][x] = char

      set_url()
      get_new_gens()
    }

    function field_to_str(field) {
      return field.map(function (line) {return line.join('')}).join("\n")
    }

    function spaceel(el) {
      el.textContent = field_to_str(spacebox())
    }

    function spacebox() {
      let line = Array(field_length).fill(' ')
      let box = Array(field_rows).fill(line)
      return JSON.parse(JSON.stringify(box)) // deep copy to drop line refs
    }

    function getRowCol(node, offset) {
      const before = document.createRange()
      before.selectNodeContents(selectfield_el)
      before.setEnd(node, offset)
      const text = before.toString()
      const lines = text.split('\n')
      const row = lines.length - 1
      const col = lines[lines.length - 1].length
      return {row, col}
    }

    document.addEventListener('selectionchange', () => {
      const sel = window.getSelection()
      if(!sel.rangeCount || !selectfield_el.contains(sel.anchorNode)) return

      const range = sel.getRangeAt(0)
      const start = getRowCol(range.startContainer, range.startOffset)
      const end = getRowCol(range.endContainer, range.endOffset)
      
      highlightBox(start, end)
      sell_ect = {start: start, end: end}
    })

    function highlightBox(start, end) {
      // Get original text
      const text = subfield_el.textContent
      const lines = text.split('\n')

      // Normalize box coordinates
      const minRow = Math.min(start.row, end.row)
      const maxRow = Math.max(start.row, end.row)
      const minCol = Math.min(start.col, end.col)
      const maxCol = Math.max(start.col, end.col)

      // Rebuild with spans
      const newLines = lines.map((line, row) => {
        if(row < minRow || row > maxRow) return line

        const before = line.slice(0, minCol)
        const box = line.slice(minCol, maxCol)
        const after = line.slice(maxCol)

        return before + '<span class="selection">' + box + '</span>' + after
      })

      subfield_el.innerHTML = newLines.join('\n')
    }
